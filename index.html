<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#EDE8DF}
#app{height:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit}
button:focus,input:focus,textarea:focus,select:focus{outline:none}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#EDE8DF}
::-webkit-scrollbar-thumb{background:#C0BAA8}

.sf{font-family:'Cormorant Garamond',Georgia,serif}
.sn{font-family:'DM Sans',system-ui,sans-serif}
.sm{font-family:'JetBrains Mono','Courier New',monospace}

@keyframes blink{50%{opacity:0}}
@keyframes ticker{to{transform:translateX(-50%)}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes lineIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
@keyframes soonPop{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(184,116,32,0)}50%{box-shadow:0 0 18px 2px rgba(184,116,32,.18)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.asu{animation:slideUp .36s cubic-bezier(.22,.68,0,1.1) both}
.afu{animation:fadeUp .28s cubic-bezier(.22,.68,0,1.1) both}
.asc{animation:scaleIn .26s cubic-bezier(.22,.68,0,1.1) both}
.s1{animation-delay:.05s}.s2{animation-delay:.10s}.s3{animation-delay:.15s}
.s4{animation-delay:.20s}.s5{animation-delay:.25s}.s6{animation-delay:.30s}

.bh{transition:opacity .14s,transform .12s}
.bh:hover{opacity:.8}
.bh:active{opacity:.6;transform:scale(.97)}
.rh{transition:background .12s}
.rh:hover{background:#E0D8C8!important}

/* Scrollable tab bar */
.tabs-scroll{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;gap:0}
.tabs-scroll::-webkit-scrollbar{display:none}

/* Skill cards */
.skc{background:#EDE8DF;border:1px solid #D8D0BE;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;overflow:hidden}
.skc:hover{border-color:#B87420;transform:translateY(-2px);box-shadow:0 6px 24px rgba(184,116,32,.1)}
.skc:active{transform:translateY(0)}

/* Stat cards */
.stc{background:#EDE8DF;border:1px solid #D8D0BE;padding:18px 16px;transition:border-color .15s,transform .15s}
.stc:hover{border-color:#B87420;transform:translateY(-1px)}

/* Timeline */
.tl-item{position:relative;padding-left:30px;padding-bottom:26px}
.tl-item::before{content:'';position:absolute;left:7px;top:18px;bottom:0;width:1px;background:#D8D0BE}
.tl-item::after{content:'';position:absolute;left:0;top:3px;width:15px;height:15px;border:2px solid #D8D0BE;background:#EDE8DF;transition:all .2s}
.tl-item.done::after{border-color:#3D6B28;background:#3D6B28}
.tl-item.active::after{border-color:#B87420;background:#B87420;animation:glow 2s ease infinite}
.tl-item:last-child::before{display:none}

/* Form elements */
.fi{width:100%;padding:11px 13px;background:#EDE8DF;border:1px solid #D8D0BE;font-size:13px;color:#1C1C17;transition:border-color .15s}
.fi:focus{border-color:#B87420}
.fi::placeholder{color:#C0BAA8}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#9B9585;margin-bottom:6px;font-family:'DM Sans',system-ui,sans-serif}

/* Leaderboard */
.lb-r{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #D8D0BE;transition:background .12s}
.lb-r:hover{background:#E5DED0}
.lb-n{font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:300;color:#C0BAA8;width:32px;text-align:center;flex-shrink:0}

/* Code blocks */
.cb{background:#0D0D0A;padding:14px 16px;margin:10px 0;font-family:'JetBrains Mono','Courier New',monospace;font-size:clamp(9px,1.8vw,11px);line-height:2;overflow-x:auto;border-left:2px solid #B87420}
.cb .cd{color:#2E2E26}
.cb .ca{color:#B87420}
.cb .cg{color:#3D9142}
.cb .cw{color:#EDE8DF}

/* Doc nav */
.dn{display:block;padding:7px 12px;font-size:11px;font-weight:500;color:#9B9585;cursor:pointer;transition:color .12s,background .12s;text-align:left;border:none;background:none;width:100%;border-left:2px solid transparent}
.dn:hover{color:#1C1C17;background:#E5DED0}
.dn.active{color:#B87420;border-left-color:#B87420;background:#E5DED0}

/* SDK code */
.sdk-tab{padding:5px 12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:none;background:none;transition:all .14s;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',system-ui,sans-serif}
.sdk-tab.active{color:#B87420;border-bottom-color:#B87420}
.sdk-tab:not(.active){color:#9B9585}

/* Art sections */
.art-s{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(18px,3vw,24px);font-weight:400;color:#1C1C17;margin:24px 0 10px;line-height:1.2}
.art-p{font-family:'DM Sans',system-ui,sans-serif;font-size:clamp(13px,2vw,15px);color:#6B6655;line-height:1.8;margin-bottom:16px}
.art-ul{list-style:none;padding:0;margin-bottom:16px}
.art-ul li{font-family:'DM Sans',system-ui,sans-serif;font-size:clamp(13px,2vw,15px);color:#6B6655;line-height:1.8;padding-left:16px;position:relative;margin-bottom:5px}
.art-ul li::before{content:'\00b7';position:absolute;left:0;color:#B87420;font-weight:700}
.art-pull{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(18px,3vw,24px);font-weight:300;color:#1C1C17;line-height:1.4;letter-spacing:-.3px;border-left:2px solid #B87420;padding-left:18px;margin:20px 0;font-style:italic}
.art-call{background:#E5DED0;border-left:3px solid #B87420;padding:14px 16px;margin:16px 0;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;color:#6B6655;line-height:1.7}

/* Window */
.win{border:1px solid transparent;background:#EDE8DF;overflow:hidden;transition:box-shadow .2s,border-color .15s}
.win.active{border-color:#D8D0BE;box-shadow:0 2px 28px rgba(0,0,0,.08)}
.win-tb{height:32px;display:flex;align-items:center;padding:0 12px;gap:10px;user-select:none;flex-shrink:0;border-bottom:1px solid #D8D0BE;transition:background .15s}
.win-dot{width:11px;height:11px;border-radius:50%;border:none;padding:0;cursor:pointer;transition:opacity .15s}
.win-dot:hover{opacity:.7}

/* Tag chips */
.chip{display:inline-block;font-family:'JetBrains Mono','Courier New',monospace;font-size:9px;padding:2px 7px;border:1px solid #D8D0BE;color:#9B9585;margin:2px}

/* Community card */
.cc{background:#EDE8DF;border:1px solid #D8D0BE;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s,transform .12s}
.cc:hover{border-color:#B87420;transform:translateX(3px)}
</style>

  {id:0,tag:'01 \u00b7 Overview',read:'8 min',
   title:'KERNAL: The Skill Registry That Turns Any AI Agent Into an On-Chain Operator',

   secs:[
     {h:null,b:'There\u2019s a gap forming in the AI agent ecosystem, and most people haven\u2019t noticed it yet.\n\nOn one side: agent frameworks \u2014 Aeon, Claude Code, Cursor, Codex, AutoGPT. Powerful, increasingly autonomous, and growing in capability every month. On the other: the on-chain world \u2014 DeFi protocols, token markets, MEV, LP positions, governance, yield strategies. Raw, complex, and constantly moving.\n\nBetween them? A skill gap. Agents can reason and act \u2014 but they need instructions for what to do specifically. That\u2019s where KERNAL comes in.'},
     {h:'What Is KERNAL?',b:'KERNAL is an agent skill registry built specifically for on-chain execution. Think of it as an app store, but instead of apps you download to your phone, you install skills into your AI agent \u2014 and those skills let it operate autonomously on-chain.\n\nEvery skill is a markdown file (SKILL.md) containing structured instructions that any compatible AI agent can read and execute. No SDK, no wrapper, no vendor lock-in. Fork a repo, drop in the file, set enabled: true.'},

  {id:1,tag:'02 \u00b7 Technical',read:'6 min',
   title:'The Agent Skills Format: Why Markdown Is the Right Abstraction for On-Chain AI',
   intro:'How SKILL.md files work, why natural language outperforms compiled plugins, and the full format reference.',
   secs:[
     {h:null,b:'Imagine you want your AI agent to snipe new token launches on Base. You could write a custom plugin \u2014 wire up the Uniswap SDK, handle private key signing, build error recovery. That\u2019s weeks of work that breaks when the framework updates.\n\nOr you could drop a SKILL.md file into your agent\u2019s skills/ folder.'},
     {h:'Why Natural Language?',b:'The best interface for an AI agent isn\u2019t an API. It\u2019s language. Your agent is a language model \u2014 it doesn\u2019t need compiled binaries. It needs instructions it can interpret, reason about, and adapt to edge cases.\n\nA traditional plugin fails silently when an edge case hits. A skill file lets the agent reason: "Liquidity is lower than threshold but the contract looks legitimate \u2014 should I notify instead of skip?" It makes judgment calls. That\u2019s the entire point of using an AI agent.'},
     {h:'Anatomy of a SKILL.md',b:'Every skill file has two parts:\n\n1. Frontmatter (YAML) \u2014 name, version, tier, category, trigger type, schedule, dependency list\n\n2. Body (natural language) \u2014 step-by-step instructions your agent reads and executes\n\nThe frontmatter is parsed by the agent runtime to configure the execution environment. The body is passed as a system prompt to the model. The two parts together are everything the agent needs.'},
     {h:'Triggers',b:'SKILL.md supports three trigger types:\n\n\u00b7 scheduled \u2014 cron-style schedule (e.g., every 15 minutes)\n\u00b7 on_event \u2014 fires on specific on-chain events (pool creation, transfer, price threshold)\n\u00b7 manual \u2014 user-invoked from the agent\u2019s chat interface\n\nAll 12 KERNAL skills use one of these three trigger types.'},
     {h:'Compatibility Matrix',b:'All KERNAL skills are tested against: Aeon, Claude Code, Cursor, Codex. Any agent that supports the Agent Skills open spec (37+ frameworks) can run KERNAL skills without modification.'}
   ]},

/* ── Actions ── */
function go(v){S.view=v;if(v==='article')S.artIdx=null;renderMobile();}
function goSkill(id){S.mobSkill=SK.filter(function(s){return s.id===id;})[0];S.view='sd';renderMobile();}
function setFilter(f){S.filter=f;if(S.isMob)renderMobile();else renderDesktop();}
function selSkillFn(id){S.selSkill=SK.filter(function(s){return s.id===id;})[0];renderDesktop();}
function openWin(id){if(S.wins.indexOf(id)<0)S.wins.push(id);S.activeWin=id;renderDesktop();}
function closeWin(id){S.wins=S.wins.filter(function(w){return w!==id;});if(S.activeWin===id)S.activeWin=S.wins.length?S.wins[S.wins.length-1]:null;renderDesktop();}
function focusWin(id){S.activeWin=id;renderDesktop();}
function openArt(i){S.artIdx=i;S.view='artDetail';renderMobile();}
function openArtDesk(i){S.artIdx=i;renderDesktop();}
function closeArt(){S.artIdx=null;S.view='article';renderMobile();}
function setDocSec(id){S.docSec=id;if(S.isMob)renderMobile();else renderDesktop();}
function setLbTab(t){S.lbTab=t;if(S.isMob)renderMobile();else renderDesktop();}
function setSdkTab(t){S.sdkTab=t;if(S.isMob)renderMobile();else renderDesktop();}
function showSoon(){var el=document.getElementById('soon-overlay');el.style.display='flex';}
function hideSoon(){document.getElementById('soon-overlay').style.display='none';}
function open3d(){window.open('kernal-3d.html','_blank');}
function noop(){}
function submitForm(){S.formSubmitted=true;if(S.isMob)renderMobile();else renderDesktop();}
function installFree(id){
  var skill=SK.filter(function(s){return s.id===id;})[0];
  if(!skill||skill.tier==='premium'){showSoon();return;}
  var lines=['$ kernal install '+skill.name,'\u2192 Resolving '+skill.name+'@'+skill.v+'...','\u2192 Free tier \u2014 no token required','\u2192 Fetching from registry.kernal.io...','\u2192 Verifying checksum (sha256)... \u2713','\u2192 Writing skills/'+skill.name+'/SKILL.md','\u2192 Registering in aeon.yml...','','\u2713 '+skill.name+' v'+skill.v+' installed successfully.','  Set enabled: true in your agent config.'];
  S.termLines=[];
  if(S.isMob){S.view='terminal';renderMobile();}else{if(S.wins.indexOf('terminal')<0)S.wins.push('terminal');S.activeWin='terminal';renderDesktop();}
  lines.forEach(function(l,i){
    setTimeout(function(){
      S.termLines.push(l);
      var el=document.getElementById('term-out');if(!el)return;
      var d=document.createElement('div');d.className='sm';
      var col=l.startsWith('\u2713')?'#3D9142':l.startsWith('\u2192')?C.mid:l.startsWith('$')?C.amber:'#363630';
      d.style.cssText='font-size:'+(S.isMob?'11':'10')+'px;color:'+col+';white-space:pre-wrap;animation:lineIn .11s ease both';
      d.textContent=l||'\u00a0';
      var cur=el.querySelector('#tcur');if(cur)cur.remove();
      el.appendChild(d);
      var cursor=document.createElement('span');cursor.id='tcur';cursor.className='sm';
      cursor.style.cssText='animation:blink 1s step-end infinite;color:'+C.amber;cursor.textContent='\u2588';
      el.appendChild(cursor);
      var p=el.parentElement;if(p)p.scrollTop=p.scrollHeight;
    },i*140);
  });
}

  }
});

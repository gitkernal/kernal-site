<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#EDE8DF}
#app{height:100%}
a,button{cursor:pointer;font-family:inherit}
button{border:none;background:none}
button:focus,a:focus{outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#EDE8DF}
::-webkit-scrollbar-thumb{background:#C0BAA8}

/* Fonts fallback */
.sf{font-family:'Cormorant Garamond',Georgia,serif}
.sn{font-family:'DM Sans',system-ui,sans-serif}
.sm{font-family:'JetBrains Mono','Courier New',monospace}

@keyframes blink    {50%{opacity:0}}
@keyframes ticker   {to{transform:translateX(-50%)}}
@keyframes fadeUp   {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp  {from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn  {from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes lineIn   {from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes ovIn     {from{opacity:0}to{opacity:1}}
@keyframes soonPop  {from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse    {0%,100%{opacity:.5}50%{opacity:1}}

.afu{animation:fadeUp .32s cubic-bezier(.22,.68,0,1.1) both}
.asu{animation:slideUp .36s cubic-bezier(.22,.68,0,1.1) both}
.asc{animation:scaleIn .26s cubic-bezier(.22,.68,0,1.1) both}

/* Hover effects */
.bh{transition:opacity .14s,transform .12s}
.bh:hover{opacity:.8}
.bh:active{opacity:.6;transform:scale(.98)}
.rh{transition:background .13s}
.rh:hover{background:#E0D8C8!important}
.win-b:hover{background:rgba(255,255,255,.05)!important}
</style>
</head>

        return '<div><div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;gap:10px"><span class="sn" style="font-size:11px;font-weight:500;color:'+C.amber+'">'+item[0]+'</span><span class="sn" style="font-size:11px;color:'+C.light+';text-align:right">'+item[1]+'</span></div>'+(i<a.length-1?hr():'')+'</div>';
      }).join('')+
    '</div>'+
  '</div>';
}

      '<div class="sn" style="font-size:13px;color:'+C.mid+';line-height:1.8;white-space:pre-line">'+s.b+'</div>'+

      '<div>'+lbl('Article \u00b7 2025','color:'+C.amber+';margin-bottom:10px')+'<div class="sf" style="font-size:18px;font-weight:300;color:'+C.bg+';line-height:1.35;margin-bottom:14px">KERNAL: The Skill Registry That Turns Any AI Agent Into an On-Chain Operator</div><div class="sn" style="font-size:11px;color:rgba(255,255,255,.32);line-height:1.6;font-style:italic">The next layer of crypto infrastructure isn\'t a chain. It\'s the skill.</div></div>'+
      '<div>'+hr('background:'+C.darkB+';margin-bottom:12px')+'<div class="sm" style="font-size:9px;color:'+C.darkB+';letter-spacing:1px;line-height:1.8"><div>KERNAL \u00b7 kernal.io</div><div>$KRN \u00b7 Base Network</div></div></div>'+
    '</div>'+
    '<div style="flex:1;padding:24px 26px;overflow:auto">'+secs+'<div style="padding:12px;background:'+C.bg2+';border:1px solid '+C.bg3+';font-family:\'DM Sans\',system-ui,sans-serif;font-size:11px;color:'+C.light+';line-height:1.6;font-style:italic;margin-top:8px">Not financial advice.</div></div>'+
  '</div>';
}

function deskDocs(){
  var secs=[
    {l:'Overview',h:'KERNAL',b:'Agent skill registry for on-chain AI. Compatible with Aeon, Claude Code, Cursor, and Codex.'},
    {l:'Setup',h:'Quick Start',b:'1. Browse SKILLS.db \u2192 select \u2192 Install\n2. Paste SKILL.md into skills/ folder\n3. Premium: 10,000,000+ $KRN required'},
    {l:'Revenue',h:'Revenue Model',b:'0.2% execution fee \u2192 treasury \u2192 $KRN stakers.'},
    {l:'Contribute',h:'Submit a Skill',b:'PR to kernal-registry. Earn 50% of execution fee revenue.\nListing fee: 5,000,000 $KRN.'}

    }).join('')+

function renderDesktop(){
  var utc=new Date().toISOString().slice(11,19);
  var icons=[{id:'skills',l:'SKILLS.db',i:'\u25c8'},{id:'token',l:'$KRN.token',i:'\u25c9'},{id:'terminal',l:'TERMINAL',i:'\u25b8'},{id:'article',l:'ARTICLE.md',i:'\u2726'},{id:'docs',l:'README.md',i:'\u25fb'}];
  var dock=icons.map(function(ic){
    var open=S.wins.indexOf(ic.id)>=0;
    return '<button onclick="openWin(\''+ic.id+'\')" class="bh sn" style="background:'+(open?C.dark:'transparent')+';border:1px solid '+(open?C.dark:C.bg3)+';color:'+(open?C.bg:C.mid)+';padding:5px 12px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:7px;transition:all .14s"><span style="font-size:11px">'+ic.i+'</span><span>'+ic.l+'</span></button>';
  }).join('');
  var windows=S.wins.map(function(wid){return deskWin(wid);}).join('');
  var taskbtns=S.wins.map(function(w){
    var a=S.activeWin===w;
    return '<button onclick="focusWin(\''+w+'\')" class="win-b sn" style="background:'+(a?'rgba(255,255,255,.06)':'transparent')+';border:1px solid '+(a?C.darkB:'transparent')+';color:'+(a?'#C0BAA8':'#363630')+';padding:3px 10px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all .12s">'+w+'</button>';
  }).join('');
  document.getElementById('app').innerHTML=
    '<div style="background:'+C.bg+';min-height:100vh;color:'+C.text+';display:flex;flex-direction:column">'+
      '<div style="height:44px;background:'+C.bg+';border-bottom:1px solid '+C.bg3+';display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0">'+
        '<div style="display:flex;align-items:center;gap:10px">'+km(22,C.dark,C.amber)+'<span class="sf" style="font-size:18px;font-weight:400;color:'+C.text+';font-style:italic;letter-spacing:.5px">kernal</span></div>'+
        '<div style="flex:1;height:1px;background:'+C.bg3+'"></div>'+
        lbl('Agent Skill Registry \u00b7 Base Network','color:'+C.ghost)+
      '</div>'+
      '<div style="padding:10px 20px;display:flex;gap:6px;border-bottom:1px solid '+C.bg3+';flex-wrap:wrap;flex-shrink:0">'+dock+'</div>'+
      '<div style="flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:12px;padding-bottom:52px;overflow:auto">'+windows+'</div>'+
      '<div style="position:fixed;bottom:0;left:0;right:0;height:40px;background:'+C.dark+';border-top:1px solid '+C.darkB+';display:flex;align-items:center;padding:0 20px;gap:10px;z-index:100">'+
        km(18,'#C0BAA8',C.amber)+
        '<div style="width:1px;height:14px;background:'+C.darkB+'"></div>'+
        '<div style="display:flex;gap:3px;flex:1">'+taskbtns+'</div>'+
        '<div style="display:flex;align-items:center;gap:12px;flex-shrink:0">'+
          '<span class="sn" style="font-size:10px;color:'+C.amber+';font-weight:500">$KRN</span>'+
          '<span class="sn" style="font-size:10px;color:#363630">Soon</span>'+
          '<div style="width:1px;height:14px;background:'+C.darkB+'"></div>'+
          '<span class="sn" style="font-size:10px;color:#363630">Base</span>'+
          '<div style="width:1px;height:14px;background:'+C.darkB+'"></div>'+
          '<button class="bh sn" style="background:transparent;border:1px solid '+C.darkB+';color:rgba(255,255,255,.3);padding:3px 10px;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase">Connect</button>'+
          '<span id="utc-clock" class="sm" style="font-size:9px;color:#363630;letter-spacing:1px">'+utc+'Z</span>'+
        '</div>'+
      '</div>'+
    '</div>';
}

/* ── Actions ─────────────────────────────────────────────────────────────── */
function go(v){
  if(v==='skills'||v==='home'||v==='token'||v==='terminal'||v==='article'||v==='docs'){
    S.view=v;renderMobile();
  }
}
function goSkill(id){
  S.mobSkill=SK.filter(function(s){return s.id===id;})[0];
  S.view='sd';renderMobile();
}
function setFilter(f){
  S.filter=f;
  if(S.isMob)renderMobile();
  else renderDesktop();
}
function selSkillFn(id){
  S.selSkill=SK.filter(function(s){return s.id===id;})[0];
  renderDesktop();
}
function openWin(id){
  if(S.wins.indexOf(id)<0)S.wins.push(id);
  S.activeWin=id;renderDesktop();
}
function closeWin(id){
  S.wins=S.wins.filter(function(w){return w!==id;});
  if(S.activeWin===id)S.activeWin=S.wins.length?S.wins[S.wins.length-1]:null;
  renderDesktop();
}
function focusWin(id){
  S.activeWin=id;renderDesktop();
}
function showSoon(){
  var el=document.getElementById('soon-overlay');
  el.style.display='flex';
  el.style.animation='ovIn .2s ease';
}
function hideSoon(){
  document.getElementById('soon-overlay').style.display='none';
}
function installFree(id){
  var skill=SK.filter(function(s){return s.id===id;})[0];
  if(!skill||skill.tier==='premium'){showSoon();return;}
  var lines=[
    '$ kernal install '+skill.name,
    '\u2192 Resolving '+skill.name+'@'+skill.v+'...',
    '\u2192 Free tier \u2014 no token required',
    '\u2192 Fetching from registry.kernal.io...',
    '\u2192 Verifying checksum (sha256)... \u2713',
    '\u2192 Writing skills/'+skill.name+'/SKILL.md',
    '\u2192 Registering entry in aeon.yml...',
    '',
    '\u2713 '+skill.name+' v'+skill.v+' installed successfully.',
    '  Set enabled: true in aeon.yml to activate.'
  ];
  S.termLines=[];
  if(S.isMob){S.view='terminal';renderMobile();}
  else{
    if(S.wins.indexOf('terminal')<0)S.wins.push('terminal');
    S.activeWin='terminal';renderDesktop();
  }
  lines.forEach(function(l,i){
    setTimeout(function(){
      S.termLines.push(l);
      var el=document.getElementById('term-out');
      if(!el)return;
      var col=l.startsWith('\u2713')?'#3D9142':l.startsWith('\u2192')?C.mid:l.startsWith('$')?C.amber:'#363630';
      var d=document.createElement('div');
      d.className='sm';
      d.style.cssText='font-size:'+(S.isMob?'11':'10')+'px;color:'+col+';white-space:pre-wrap;word-break:break-all;animation:lineIn .12s ease both';
      d.textContent=l||'\u00A0';
      // remove cursor
      var cur=el.querySelector('#tcur');if(cur)cur.remove();
      el.appendChild(d);
      // re-add cursor at end
      var cursor=document.createElement('span');cursor.id='tcur';cursor.className='sm';
      cursor.style.cssText='animation:blink 1s step-end infinite;color:'+C.amber;cursor.textContent='\u2588';
      el.appendChild(cursor);
      // scroll
      var parent=el.parentElement;if(parent)parent.scrollTop=parent.scrollHeight;
    },i*150);
  });
}

/* ── Clock ───────────────────────────────────────────────────────────────── */
setInterval(function(){
  var el=document.getElementById('utc-clock');
  if(el)el.textContent=new Date().toISOString().slice(11,19)+'Z';
},1000);

/* ── Resize ──────────────────────────────────────────────────────────────── */
window.addEventListener('resize',function(){
  var mob=window.innerWidth<768;
  if(mob!==S.isMob){
    S.isMob=mob;
    if(S.phase==='os'){
      if(mob)renderMobile();
      else{if(!S.wins.length){S.wins=['skills'];S.activeWin='skills';}renderDesktop();}
    }
  }
});

/* ── Init ─────────────────────────────────────────────────────────────────── */
startBoot();
</script>
